<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSV Import</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="page-header">
      <svg class="logo-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1.5" y="1.5" width="15" height="15" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <line x1="1.5" y1="6.5" x2="16.5" y2="6.5" stroke="currentColor" stroke-width="1.4"/>
        <line x1="6.5" y1="6.5" x2="6.5" y2="16.5" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      <h1>CSV Import</h1>
    </header>

    <form id="form" class="card">
      <div class="fields">
        <label class="field">
          <span class="field-label">API Base</span>
          <input id="apiBase" type="url" value="http://localhost:3000" autocomplete="off" spellcheck="false" />
        </label>
        <label class="field">
          <span class="field-label">Consumer ID</span>
          <input id="consumerId" type="text" value="tenant-demo" autocomplete="off" spellcheck="false" />
        </label>
        <label class="field">
          <span class="field-label">CSV File</span>
          <input id="csvFile" type="file" accept=".csv,text/csv" />
        </label>
      </div>
      <div class="form-foot">
        <p id="msg" class="msg" aria-live="polite"></p>
        <button id="uploadBtn" type="submit">Upload</button>
      </div>
    </form>

    <div id="statusCard" class="card hidden" aria-live="polite">
      <div class="status-row">
        <code id="importIdEl" class="import-id"></code>
        <span id="badge" class="badge"></span>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <span id="processedRows" class="stat-val">—</span>
          <span class="stat-lbl">Processed</span>
        </div>
        <div class="stat">
          <span id="importedCount" class="stat-val">—</span>
          <span class="stat-lbl">Imported</span>
        </div>
        <div class="stat">
          <span id="errorCount" class="stat-val">—</span>
          <span class="stat-lbl">Errors</span>
        </div>
      </div>
      <div id="fileName" class="file-name"></div>
    </div>

    <div id="errorsCard" class="card hidden">
      <div class="errors-head">Validation Errors</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Line</th><th>Data</th><th>Error</th></tr>
          </thead>
          <tbody id="errorsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
