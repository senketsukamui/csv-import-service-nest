global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    static_configs:
      - targets: ["api:3000"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:3001"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
